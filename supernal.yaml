# Supernal Configuration for @supernal/repotype

version: '1.0'
package:
  name: '@supernal/repotype'
  type: standalone
  license: CC-BY-NC-SA-4.0

upstream:
  repo: https://github.com/supernalintelligence/supernal-coding
  docs_path: docs/features/developer-tooling/repotype

requirements:
  prefix: REQ-REPOTYPE
  path: .supernal/requirements

testing:
  framework: vitest
  path: tests/**/*.test.ts
  requirement_linkage: true

features:
  requirement_tracking: true
  test_traceability: true
  commit_traceability: true
  gherkin_e2e_stories: true

director:
  enabled: true
  schedule: "*/15 * * * *"
  dry_run: false
  max_workers: 2
  surfaces:
    local: true
    github: false
    vercel: false
    supabase: false
    ci: false
  queue:
    depth_limit: 50
    backpressure_high: 30
    backpressure_low: 20
  rate_limits:
    github: 5000
    vercel: 100
    supabase: 200
  autofix:
    max_open_prs: 3
    max_open_prs_per_submodule: 1
    pr_check_command: gh pr list
