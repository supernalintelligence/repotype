name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install
        run: npm install
        
      - name: Typecheck
        run: npm run typecheck
        
      - name: Build
        run: npm run build
        
      - name: Self-validate (repotype validates itself)
        run: npm run self:validate
