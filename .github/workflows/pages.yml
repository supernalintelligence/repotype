name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs-site/**'
      - 'src/**'
      - 'bin/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install root dependencies
        run: npm install
        
      - name: Build repotype CLI
        run: npm run build
        
      - name: Build docs site
        working-directory: docs-site
        run: |
          npm install
          npm run build
          
      - name: Prepare deployment
        run: |
          mkdir -p _site
          # Copy landing page to root
          cp -r site/* _site/
          # Copy docs (Starlight builds to dist/)
          cp -r docs-site/dist/* _site/
          
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
